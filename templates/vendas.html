<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas | Open Milhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --marinho: #0a192f; --dourado: #c5a059; }
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar, .footer { background-color: var(--marinho) !important; border-top: 3px solid var(--dourado); color: white; }
        .navbar { border-top: none; border-bottom: 3px solid var(--dourado); padding: 15px 0; }
        .card-success { 
            background: white; border-radius: 25px; border: 2px solid #28a745; 
            padding: 50px; box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }
        .check-circle { font-size: 70px; color: #28a745; margin-bottom: 20px; }
        .deadline-box { background: #e9f7ef; border: 1px dashed #28a745; border-radius: 15px; padding: 20px; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/dashboard">
                <img src="{{ url_for('static', filename='img/logo.png') }}" width="45" class="me-2">
                OPEN MILHAS
            </a>
        </div>
    </nav>

    <main class="container py-5">
        <div class="col-lg-7">
            <div class="card-success text-center">
                <i class="fa-solid fa-circle-check check-circle"></i>
                <h1 class="fw-bold mb-3">Venda Concluída!</h1>
                <p class="lead text-muted mb-4">Sua solicitação de venda foi processada com sucesso por nossa rede de parceiros.</p>
                
                <div class="deadline-box mb-4">
                    <h4 class="mb-1 text-success fw-bold">Prazo de Recebimento</h4>
                    <h2 class="display-6 fw-bold">5 DIAS ÚTEIS</h2>
                </div>

                <div class="mb-4">
                    <p class="mb-1">Status da Transação:</p>
                    <span class="badge bg-success px-4 py-2 fs-6">VALOR EM CONTA IDENTIFICADO</span>
                </div>

                <a href="/dashboard" class="btn btn-dark px-5 py-3 fw-bold rounded-pill">
                    <i class="fa-solid fa-arrow-left me-2"></i>VOLTAR AO PAINEL
                </a>
            </div>
        </div>
    </main>

    <footer class="footer p-4 text-center">
        <p class="mb-0">© 2026 <strong>Open Milhas</strong> - Todos os direitos reservados.</p>
    </footer>
</body>
</html>
