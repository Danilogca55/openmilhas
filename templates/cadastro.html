<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Open Milhas | Acesso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: #0f172a; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;">
    <div style="background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; border: 1px solid #ffd700; text-align: center; width: 100%; max-width: 350px;">
        <h2 style="font-weight: bold; margin-bottom: 10px;">OPEN <span style="color: #ffd700;">MILHAS</span></h2>
        <p style="opacity: 0.7; margin-bottom: 30px;">Sistema de Inteligência Ativo</p>
        
        <form action="/login" method="POST">
            <input type="email" class="form-control mb-3" placeholder="Seu e-mail" required style="background: #1e293b; color: white; border: none;">
            <input type="password" class="form-control mb-4" placeholder="Sua senha" required style="background: #1e293b; color: white; border: none;">
            <button type="submit" class="btn w-100" style="background: #ffd700; color: black; font-weight: bold; border-radius: 10px;">ENTRAR NO PAINEL</button>
        </form>
    </div>
</body>
</html>
