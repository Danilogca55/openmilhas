<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Milhas | Vender Milhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --primary: #2c7da0; --gold: #c5a059; --dark: #0a1128; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; color: #333; }
        .navbar-brand { font-weight: 800; color: var(--dark) !important; font-size: 1.6rem; }
        .navbar-brand span { color: var(--gold); }
        .progress-bar-custom { height: 10px; background: #e9ecef; border-radius: 20px; margin: 40px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 33%; transition: 0.6s ease; }
        /* Garante que os inputs apareçam corretamente */
        .form-control { border-radius: 50px; padding: 15px 25px; border: 1px solid #ddd; margin-bottom: 20px; display: block; width: 100%; }
        .btn-next { background: #469cb4; color: white; border-radius: 50px; padding: 12px 50px; border: none; font-weight: bold; width: 100%; }
        .footer-trust { background: #fdfdfd; border-top: 1px solid #eee; padding: 40px 0; margin-top: 50px; width: 100%; }
        .badge-img { height: 35px; margin: 10px 15px; filter: grayscale(100%); opacity: 0.6; transition: 0.3s; }
        .badge-img:hover { filter: grayscale(0); opacity: 1; }
    </style>
</head>
<body>

<nav class="navbar border-bottom py-3">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand" href="#">OPEN <span>MILHAS</span></a>
        <div class="small text-muted">Passo 1 de 3</div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 600px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold">Complete seu cadastro</h2>
        <p class="text-muted">Valide seus dados para concluir a cotação.</p>
    </div>

    <div class="progress-bar-custom"><div class="progress-fill"></div></div>

    <form action="/login" method="POST">
        <div class="mb-3">
            <input type="text" name="nome" class="form-control" placeholder="Nome completo *" required>
        </div>
        <div class="mb-3">
            <input type="text" name="cpf" id="cpf" class="form-control" placeholder="CPF *" required>
        </div>
        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="E-mail principal *" required>
        </div>
        
        <div class="mt-4">
            <button type="submit" class="btn-next">Continuar <i class="fas fa-arrow-right ms-2"></i></button>
        </div>
    </form>
</div>

<footer class="footer-trust text-center">
    <div class="container">
        <p class="small fw-bold text-muted mb-4">PLATAFORMA SEGURA E HOMOLOGADA</p>
        <div class="d-flex justify-content-center align-items-center flex-wrap">
            <img src="https://logodownload.org/wp-content/uploads/2017/11/reclame-aqui-logo.png" class="badge-img" alt="Reclame Aqui">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Google_Safe_Browsing_logo.svg/1200px-Google_Safe_Browsing_logo.svg.png" class="badge-img" alt="Google Safe">
            <img src="https://static.wixstatic.com/media/2cd43b_7f8674b65d3a43399659f8c853177695~mv2.png/v1/fill/w_320,h_102,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/Selo%20Seguro%20SSL.png" class="badge-img" alt="SSL">
            <img src="https://logodownload.org/wp-content/uploads/2019/08/cadastur-logo.png" class="badge-img" alt="Cadastur">
        </div>
        <p class="mt-4 text-muted small">OPEN MILHAS &copy; 2026 | CNPJ: 26.878.221/0001-50</p>
    </div>
</footer>

<script src="https://unpkg.com/imask"></script>
<script>
    IMask(document.getElementById('cpf'), { mask: '000.000.000-00' });
</script>

</body>
</html>
