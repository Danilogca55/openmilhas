<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Milhas | Venda suas milhas agora</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --primary: #0046ff; --dark-blue: #002db3; --gold: #c5a059; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding: 0; }
        
        /* Navbar Estilo Clean */
        .navbar { background: white; border-bottom: 1px solid #eee; padding: 15px 0; }
        .navbar-brand { font-family: 'Montserrat', sans-serif; font-weight: 800; color: #0a1128 !important; text-transform: uppercase; font-size: 1.5rem; }

        /* Seção Hero (AZUL) - Correção da Imagem */
        .hero-section { 
            background: linear-gradient(90deg, var(--primary) 0%, var(--dark-blue) 100%); 
            color: white; 
            padding: 60px 0 100px 0; 
            border-radius: 0 0 50px 50px;
            position: relative;
        }
        .main-title { 
            font-family: 'Montserrat', sans-serif !important; 
            font-weight: 800 !important; 
            font-size: 3rem; 
            line-height: 1.1; 
            letter-spacing: -1px;
        }

        /* Formulário Sobreposto */
        .card-form { 
            border: none; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            margin-top: -80px; 
            z-index: 10;
            position: relative;
        }
        
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; margin-bottom: 15px; }
        .btn-next { background: var(--primary); color: white; border: none; border-radius: 50px; padding: 15px; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-next:hover { background: var(--dark-blue); transform: translateY(-2px); }
        .btn-vender { background: #28a745; color: white; font-weight: 800; border-radius: 50px; padding: 15px; width: 100%; border: none; }

        /* Selo Reclame Aqui */
        .selo-topo { position: absolute; top: 15px; right: 15px; height: 40px; }
    </style>
</head>
