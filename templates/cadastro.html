<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Milhas | Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --primary: #2c7da0; --gold: #c5a059; --dark: #0a1128; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; overflow-x: hidden; }
        
        /* Logo e Header */
        .navbar-brand { font-weight: 800; font-size: 1.6rem; }
        .progress-bar-custom { height: 10px; background: #e9ecef; border-radius: 20px; margin: 30px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 33%; transition: 0.4s; }
        
        /* Formulário */
        .form-control { border-radius: 50px; padding: 15px 25px; margin-bottom: 15px; border: 1px solid #ddd; }
        .btn-next { background: #469cb4; color: white; border-radius: 50px; padding: 12px 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-next:hover { background: var(--primary); transform: translateY(-2px); }
        
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Rodapé e WhatsApp */
        .whatsapp-float { position:fixed; width:60px; height:60px; bottom:40px; right:40px; background-color:#25d366; color:#FFF; border-radius:50px; text-align:center; font-size:30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); z-index:1000; transition: 0.3s; }
        .whatsapp-float:hover { transform: scale(1.1); color: white; }
        footer { background-color: #f8f9fa; border-top: 1px solid #dee2e6; padding: 60px 0 30px 0; margin-top: 80px; }
        .footer-logo { font-weight: 800; margin-bottom: 20px; display: block; }
        .badge-img { height: 25px; filter: grayscale(100%); opacity: 0.7; transition: 0.3s; }
        .badge-img:hover { filter: grayscale(0); opacity: 1; }
    </style>
</head>
<body>

<a href="https://wa.me/5511984221050" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp" style="margin-top:16px;"></i>
</a>

<nav class="navbar border-bottom py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="/" style="text-decoration: none;">
            <span style="color: var(--dark);">OPEN</span> <span style="color: var(--gold);">MILHAS</span>
        </a>
        <div class="small text-muted fw-bold">Passo <span id="stepNumber">1</span>
