<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Open Milhas | Vendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0a0e14; color: white; }
        .navbar { background-color: #111827; border-bottom: 2px solid #ffd700; }
        .nav-link { color: #94a3b8 !important; font-weight: 500; margin: 0 10px; }
        .nav-link.active { color: #ffd700 !important; border-bottom: 2px solid #ffd700; }
        .dashboard-card { background: #1e293b; border-radius: 15px; padding: 25px; border: 1px solid #334155; }
        .btn-sync { background: linear-gradient(to right, #b8860b, #ffd700); border: none; font-weight: bold; color: #000; border-radius: 8px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <div style="background: #ffd700; color: #000; width: 35px; height: 35px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 10px;">M</div>
                <span style="font-weight: 800; letter-spacing: 1px;">OPEN <span style="color: #ffd700;">MILHAS</span></span>
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Painel Geral</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Vender Milhas</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Histórico</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Configurações</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 text-center">
        <h2 class="mb-4">Executive Dashboard</h2>
        <p class="text-white-50">Bem-vindo, Danilo | Sistema de Inteligência Ativo</p>
        
        <div class="row mt-4">
            <div class="col-md-4"><div class="dashboard-card"><h6>SALDO DE MILHAS</h6><h3 style="color: #ffd700;">{{ info.milhas }}</h3></div></div>
            <div class="col-md-4"><div class="dashboard-card"><h6>VALOR EM CONTA</h6><h3 style="color: #ffd700;">{{ info.saldo }}</h3></div></div>
            <div class="col-md-4"><div class="dashboard-card"><h6>CATEGORIA</h6><h3 style="color: #ffd700;">{{ info.status }}</h3></div></div>
        </div>

        <div class="dashboard-card mt-4">
            <h5>Evolução de Ganhos</h5>
            <canvas id="graficoGanhos" height="100"></canvas>
        </div>

        <button class="btn btn-sync mt-4 px-5 py-3">SINCRONIZAR DADOS BANCÁRIOS</button>
    </div>

    <script>
        const ctx = document.getElementById('graficoGanhos').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: {{ meses|tojson }},
                datasets: [{ label: 'Lucros', data: {{ lucros|tojson }}, borderColor: '#ffd700', tension: 0.4 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#334155' } } } }
        });
    </script>
</body>
</html>
