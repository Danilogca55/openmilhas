<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Milhas | Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a, #1e293b); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; color: white; }
        .card-cadastro { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-primary { background: #ffd700; border: none; color: #000; font-weight: bold; padding: 12px; border-radius: 10px; transition: 0.3s; }
        .btn-primary:hover { background: #e6c200; transform: translateY(-2px); }
        .form-control { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white; border-radius: 10px; }
        .form-control:focus { background: rgba(255, 255, 255, 0.15); color: white; border-color: #ffd700; box-shadow: none; }
    </style>
</head>
<body>
    <div class="card-cadastro text-center">
        <h2 class="mb-4">OPEN <span style="color: #ffd700;">MILHAS</span></h2>
        <p class="text-white-50 mb-4">Acesse sua conta para começar a vender</p>
        <form action="/login" method="POST">
            <div class="mb-3"><input type="email" class="form-control" placeholder="E-mail" required></div>
            <div class="mb-4"><input type="password" class="form-control" placeholder="Senha" required></div>
            <button type="submit" class="btn btn-primary w-100">ENTRAR NO PAINEL</button>
        </form>
    </div>
</body>
</html>
