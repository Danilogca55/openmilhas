<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sucesso | Open Milhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-5 text-center">
        <div class="card border-0 shadow p-5 mx-auto" style="max-width: 500px; border-radius: 25px;">
            <i class="fas fa-check-circle text-success mb-4" style="font-size: 5rem;"></i>
            <h2 class="fw-bold">Venda Concluída!</h2>
            <p class="text-muted">Seu pedido foi enviado para nossa central de processamento. O valor será creditado via PIX em até 30 minutos.</p>
            <div class="bg-light p-3 rounded mb-4">
                <small class="text-muted d-block">Protocolo da Transação:</small>
                <strong class="text-primary">#OM-{{ range(10000, 99999) | random }}</strong>
            </div>
            <a href="/" class="btn btn-outline-primary rounded-pill">Voltar ao Início</a>
        </div>
    </div>
</body>
</html>
