<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Venda Concluída | Open Milhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background: #f8f9fa; }
        .card-sucesso { border-radius: 30px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; margin: 80px auto; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card card-sucesso p-5 bg-white">
            <i class="fas fa-check-circle text-success mb-4" style="font-size: 5rem;"></i>
            <h2 class="fw-bold">Milhas vendidas!</h2>
            <p class="text-muted">Sua operação foi concluída com sucesso. O valor será creditado via PIX em até 24 horas.</p>
            <div class="alert alert-primary border-0 small">
                Você receberá um e-mail de confirmação com os detalhes da transação em instantes.
            </div>
            <a href="/" class="btn btn-primary rounded-pill px-4 mt-3">Voltar ao início</a>
        </div>
    </div>
</body>
</html>
